<div class="module-content knowledge-management">
  <div class="management-card">
    <div class="card-header">
      <h3>知识库管理</h3>
      <button class="btn-primary" id="add-topic-btn">+ 添加主题</button>
    </div>
    <div class="card-body">
      <div class="table-container">
        <table class="data-table" id="topics-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>主题名称</th>
              <th>描述</th>
              <th>文件数量</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="topics-tbody">
            <tr><td colspan="5" class="loading">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal" id="topic-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="topic-modal-title">添加主题</h3>
        <button class="modal-close" id="topic-modal-close">×</button>
      </div>
      <div class="modal-body">
        <form id="topic-form">
          <div class="form-item">
            <label>主题名称 <span class="required">*</span></label>
            <input type="text" id="topic-name" required />
          </div>
          <div class="form-item">
            <label>描述</label>
            <textarea id="topic-description" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="topic-modal-cancel">取消</button>
        <button class="btn-primary" id="topic-modal-submit">确定</button>
      </div>
    </div>
  </div>
</div>
