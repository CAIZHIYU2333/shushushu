<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人聊天 - OpenAvatarChat</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="videochat.css">
</head>
<body class="wechat-layout">
    <!-- 摄像头权限请求覆盖层 -->
    <div id="webcam-permission" class="access-wrap hidden">
        <div class="permission-content">
            <div class="permission-icon">📹</div>
            <div class="permission-text">点击允许访问摄像头和麦克风</div>
            <div class="permission-hint">开始与数字人进行视频对话</div>
        </div>
    </div>

    <div class="wechat-container" id="wechat-container">
        <!-- 左侧导航栏 -->
        <aside class="sidebar" id="sidebar">
            <!-- 用户头像 -->
            <div class="sidebar-avatar" id="sidebar-avatar">
                <svg class="avatar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>

            <!-- 功能图标组 -->
            <nav class="sidebar-nav">
                <button class="nav-item active" data-action="chat" title="消息">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
                <button class="nav-item" data-action="contacts" title="联系人">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </button>
                <button class="nav-item" data-action="files" title="文件">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </button>
                <button class="nav-item" data-action="favorites" title="收藏">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </button>
            </nav>

            <!-- 底部操作 -->
            <div class="sidebar-footer">
                <button class="nav-item" id="new-chat-btn" data-action="new-chat" title="开始新对话">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button class="nav-item" id="sidebar-settings-btn" data-action="settings" title="设置">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"></path>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- 中间对话列表栏 -->
        <section class="chat-list-panel" id="chat-list-panel">
            <!-- 搜索框 -->
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="search-input" placeholder="搜索对话或数字人">
                </div>
            </div>

            <!-- 对话列表 -->
            <div class="chat-list" id="chat-list">
                <!-- 对话项将通过JavaScript动态添加 -->
            </div>
        </section>

        <!-- 右侧聊天窗口栏 -->
        <section class="chat-window-panel" id="chat-window-panel">
            <!-- 顶部标题栏 -->
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-header-avatar">
                        <svg class="avatar-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="12" cy="9" r="2"></circle>
                            <path d="M8 19h8M12 15v4"></path>
                        </svg>
                    </div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="chat-header-name">数字人助手</div>
                        <div class="chat-header-status" id="chat-status">离线</div>
                    </div>
                </div>
                <div class="chat-header-right">
                    <button class="header-btn" id="avatar-toggle-btn" title="显示/隐藏数字人">
                        <span>🎥</span>
                    </button>
                    <button class="header-btn" id="console-btn" title="控制台">
                        <span>📊</span>
                    </button>
                </div>
            </header>

            <!-- 消息显示区域 -->
            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">👋</div>
                    <div class="welcome-text">开始与数字人对话吧！</div>
                </div>
                <!-- 消息将通过JS动态添加 -->
            </div>

            <!-- 数字人视频窗口（可折叠） -->
            <div class="avatar-video-panel" id="avatar-video-panel">
                <div class="avatar-video-header">
                    <span class="avatar-video-title">数字人视频</span>
                    <button class="avatar-video-toggle" id="avatar-video-toggle">−</button>
                </div>
                <div class="avatar-video-content" id="avatar-video-content">
                    <div class="avatar-video-wrapper" id="avatar-video-wrapper">
                        <div class="remote-video-container">
                            <video class="remote-video" id="remote-video" autoplay playsinline></video>
                            <canvas class="remote-canvas" id="remote-canvas"></canvas>
                            <div class="avatar-loading" id="avatar-loading">
                                <div class="loading-dots">
                                    <span></span><span></span><span></span>
                                </div>
                                <div class="loading-text">连接中请等待</div>
                            </div>
                            <!-- 状态提示框 -->
                            <div class="status-indicator" id="status-indicator">
                                <div class="status-text" id="status-text"></div>
                                <div class="status-timer" id="status-timer"></div>
                            </div>
                        </div>
                        <div class="local-video-wrapper" id="local-video-wrapper">
                            <video class="local-video" id="local-video" autoplay muted playsinline></video>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="chat-input-area" id="chat-input-area">
                <div class="input-toolbar">
                    <button class="toolbar-btn" id="file-btn" title="文件">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="emoji-btn" title="表情">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                            <line x1="9" y1="9" x2="9.01" y2="9"></line>
                            <line x1="15" y1="9" x2="15.01" y2="9"></line>
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="voice-btn" title="语音">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <div class="input-wrapper">
                    <textarea 
                        class="chat-input" 
                        id="chat-input" 
                        placeholder="输入消息... (Enter发送, Shift+Enter换行)"
                        rows="1"
                    ></textarea>
                </div>
                <div class="input-actions">
                    <button class="send-btn" id="chat-send-btn">发送</button>
                </div>
            </div>

            <!-- AI回复状态提示 -->
            <div class="typing-indicator hidden" id="typing-indicator">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                <span class="typing-text">数字人正在输入...</span>
            </div>
        </section>
    </div>

    <!-- 操作按钮组（视频控制） -->
    <div class="video-controls" id="video-controls">
        <button class="control-btn" id="camera-toggle" title="摄像头">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>
        <button class="control-btn" id="mic-toggle" title="麦克风">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
        <button class="control-btn" id="volume-toggle" title="音量">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
        </button>
        <button class="control-btn" id="call-toggle-btn" title="开始/结束通话">
            <span class="call-icon">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
            </span>
            <span class="call-text">开始通话</span>
        </button>
    </div>

    <script src="api.js"></script>
    <script src="state.js"></script>
    <script src="stream-utils.js"></script>
    <script src="webrtc.js"></script>
    <script src="ws.js"></script>
    <script src="player.js"></script>
    <script src="gaussian-avatar.js"></script>
    <script src="videochat.js"></script>
</body>
</html>
