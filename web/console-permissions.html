<div class="module-content permission-management">
  <!-- 用户管理卡片 -->
  <div class="management-card">
    <div class="card-header">
      <h3>用户管理</h3>
      <button class="btn-primary" id="add-user-btn">+ 添加用户</button>
    </div>
    <div class="card-body">
      <div class="table-container">
        <table class="data-table" id="users-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>用户名</th>
              <th>邮箱</th>
              <th>角色</th>
              <th>权限</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr>
              <td colspan="6" class="loading">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 角色管理卡片 -->
  <div class="management-card mt-24">
    <div class="card-header">
      <h3>角色管理</h3>
      <button class="btn-primary" id="add-role-btn">+ 添加角色</button>
    </div>
    <div class="card-body">
      <div class="table-container">
        <table class="data-table" id="roles-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>角色名称</th>
              <th>描述</th>
              <th>权限</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="roles-tbody">
            <tr>
              <td colspan="5" class="loading">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 用户编辑模态框 -->
  <div class="modal" id="user-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="user-modal-title">添加用户</h3>
        <button class="modal-close" id="user-modal-close">×</button>
      </div>
      <div class="modal-body">
        <form id="user-form">
          <div class="form-item">
            <label>用户名 <span class="required">*</span></label>
            <input type="text" id="user-username" required />
          </div>
          <div class="form-item">
            <label>邮箱</label>
            <input type="email" id="user-email" />
          </div>
          <div class="form-item">
            <label>角色 <span class="required">*</span></label>
            <select id="user-role" required>
              <option value="">请选择角色</option>
            </select>
          </div>
          <div class="form-item">
            <label>权限</label>
            <div class="checkbox-group" id="user-permissions">
              <label><input type="checkbox" value="read" /> 读取</label>
              <label><input type="checkbox" value="write" /> 写入</label>
              <label><input type="checkbox" value="delete" /> 删除</label>
              <label><input type="checkbox" value="manage_users" /> 用户管理</label>
              <label><input type="checkbox" value="admin" /> 管理员</label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="user-modal-cancel">取消</button>
        <button class="btn-primary" id="user-modal-submit">确定</button>
      </div>
    </div>
  </div>

  <!-- 角色编辑模态框 -->
  <div class="modal" id="role-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="role-modal-title">添加角色</h3>
        <button class="modal-close" id="role-modal-close">×</button>
      </div>
      <div class="modal-body">
        <form id="role-form">
          <div class="form-item">
            <label>角色名称 <span class="required">*</span></label>
            <input type="text" id="role-name" required />
          </div>
          <div class="form-item">
            <label>描述</label>
            <textarea id="role-description" rows="3"></textarea>
          </div>
          <div class="form-item">
            <label>权限</label>
            <div class="checkbox-group" id="role-permissions">
              <label><input type="checkbox" value="read" /> 读取</label>
              <label><input type="checkbox" value="write" /> 写入</label>
              <label><input type="checkbox" value="delete" /> 删除</label>
              <label><input type="checkbox" value="manage_users" /> 用户管理</label>
              <label><input type="checkbox" value="admin" /> 管理员</label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="role-modal-cancel">取消</button>
        <button class="btn-primary" id="role-modal-submit">确定</button>
      </div>
    </div>
  </div>
</div>
